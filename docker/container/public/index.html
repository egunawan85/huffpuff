<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIG Workspace</title>
  <link rel="stylesheet" href="/css/workspace.css">
</head>
<body>
  <div class="user-bar" id="user-bar">
    <div class="user-info">
      <img class="user-avatar" id="user-avatar" src="" alt="">
      <span class="user-name" id="user-name"></span>
    </div>
    <a class="logout-btn" href="/auth/logout">Logout</a>
  </div>
  <div class="panel" id="claude-panel">
    <div class="panel-header">Claude Code</div>
    <iframe id="terminal" src="about:blank"></iframe>
  </div>
  <div class="divider" id="divider"></div>
  <div class="panel" id="files-panel">
    <div class="panel-header">Files</div>
    <iframe id="files" src="/file-browser.html"></iframe>
  </div>
  <div class="iframe-cover" id="cover"></div>

  <!-- Modals (in parent so they center in full browser window) -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal">
      <div class="modal-title" id="create-modal-title">New File</div>
      <input class="modal-input" id="create-modal-input" type="text" placeholder="Enter name..." spellcheck="false" autocomplete="off">
      <div class="modal-actions">
        <button class="modal-btn cancel" id="create-modal-cancel">Cancel</button>
        <button class="modal-btn confirm" id="create-modal-confirm">Create</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <div class="modal-title">Delete</div>
      <div class="modal-message" id="delete-modal-msg">Are you sure?</div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="delete-modal-cancel">Cancel</button>
        <button class="modal-btn danger" id="delete-modal-confirm">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/workspace.js"></script>
</body>
</html>
