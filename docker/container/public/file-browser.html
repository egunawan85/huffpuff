<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/css/file-browser.css">
</head>
<body>
  <div class="header">
    <span class="header-title">Folders</span>
    <div class="header-actions">
      <button class="header-btn" title="New File" onclick="createNew(false)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M9 1.5H4.5a1 1 0 00-1 1v11a1 1 0 001 1h7a1 1 0 001-1V5L9 1.5z"/><path d="M8 7v4M6 9h4"/></svg>
      </button>
      <button class="header-btn" title="New Folder" onclick="createNew(true)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M1.5 4h4l1.5 1.5h6a1 1 0 011 1v6.5a1 1 0 01-1 1h-11a1 1 0 01-1-1V5a1 1 0 011-1z"/><path d="M8 8.5v3M6.5 10h3"/></svg>
      </button>
      <button class="header-btn" title="Refresh" onclick="refresh()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M13 3a7 7 0 10.5 5.5"/><path d="M13 1v3h-3"/></svg>
      </button>
    </div>
  </div>
  <div class="tree" id="tree"></div>

  <!-- Context Menu -->
  <div class="ctx-menu" id="ctx-menu">
    <div class="ctx-item" data-action="open">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V5L9 1z"/><path d="M9 1v4h4"/></svg>
      Open
    </div>
    <div class="ctx-item" data-action="download">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>
      Download
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" data-action="new-file">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V5L9 1z"/><path d="M8 7v4M6 9h4"/></svg>
      New File
    </div>
    <div class="ctx-item" data-action="new-folder">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2 3h4l2 2h6a1 1 0 011 1v7a1 1 0 01-1 1H2a1 1 0 01-1-1V4a1 1 0 011-1z"/><path d="M8 8.5v3M6.5 10h3"/></svg>
      New Folder
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" data-action="rename">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 3l-8 8-1.5 2.5L5 12l8-8M10 3l2 2"/></svg>
      Rename
    </div>
    <div class="ctx-item" data-action="delete" style="color:#e06c75;">
      <svg viewBox="0 0 16 16" fill="none" stroke="#e06c75" stroke-width="1.2"><path d="M3 4h10M5.5 4V3a1 1 0 011-1h3a1 1 0 011 1v1M6 7v5M10 7v5M4 4l1 10h6l1-10"/></svg>
      Delete
    </div>
  </div>

  <!-- Background Context Menu (empty space right-click) -->
  <div class="ctx-menu" id="bg-ctx-menu">
    <div class="ctx-item" data-action="new-file">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V5L9 1z"/><path d="M8 7v4M6 9h4"/></svg>
      New File
    </div>
    <div class="ctx-item" data-action="new-folder">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2 3h4l2 2h6a1 1 0 011 1v7a1 1 0 01-1 1H2a1 1 0 01-1-1V4a1 1 0 011-1z"/><path d="M8 8.5v3M6.5 10h3"/></svg>
      New Folder
    </div>
  </div>

  <!-- File Viewer -->
  <div class="viewer-overlay" id="viewer">
    <div class="viewer-header">
      <div class="filepath" id="viewer-filepath"></div>
      <button class="viewer-btn" onclick="closeViewer()">Close</button>
    </div>
    <div class="viewer-content" id="viewer-content"></div>
  </div>

  <script src="/js/file-browser.js"></script>
</body>
</html>
